      full_task_object_in_json: "Full Task Object in JSON"
      full_task_object_in_json_description_1_html: "This structure shows the minimal amount of information needed<br />to create a CBRAIN task similar to this one, using the CBRAIN API.<br />This is provided to help developers working with the API. The top<br />level contains the IDs of the CBRAIN resources needed for the task<br />(e.g. the group (project) ID, the user's ID, the version of the<br />tool etc). These are the values you see at the top of the page in<br />the <em>Info</em> section."
      full_task_object_in_json_description_2_html: "The information under <strong>\"params\"</strong> is exactly what<br />is shown in the previous tab. It generally contains the scientific<br />parameters for the tool, where file names are replaced by the IDs<br />of files registered within CBRAIN."
      full_task_object_in_json_description_3_html: "For tools integrated with<br /><a href=\"https://github.com/boutiques/boutiques\" target=\"_blank\">Boutiques</a>,<br />the <strong>\"params\"</strong> structure will contain a substructure called<br /><strong>\"invoke\"</strong> where most of the scientific parameters are<br />relocated. This structure should match exactly the invoke structure that<br />the Boutiques program <em>bosh</em> expect, but again with filenames<br />replaced by CBRAIN file IDs."
      full_task_object_in_json_description_4_html: "Note that some keys and values are added to these structures during or<br />at the end of processing and are not required at the time the task is<br />submitted."
