    view_buttons:
      group_description_p1_html: "A project is a way to group together under single name a set<br />of CBRAIN files and tasks.  A project <em>is not a folder</em>.<br />Switching to a project makes it the 'active' project.  When a<br />project is active, an automatic implicit filter will be applied<br />such that only files and tasks assigned to the project are shown<br />in the file or task manager."
      group_description_p2_html: "These projects are visible only to you. There is one particular<br />project named <strong>%{name}</strong> that is created<br />by the system for you, by default, and cannot be deleted. Any of<br />these projects can be turned into a Shared Project by inviting other<br />users to join. When this happens, the projects will appear in a separate tab."
      group_description_p3_html: "These are projects that you created and are shared with other users.<br />Files and tasks assigned to a project are visible to all users of that project."
      group_description_p4_html: "These are projects created by other users who have invited you to join them.<br />Files and tasks assigned to a project are visible to all users of that project."
      group_description_p5_html: "These are Public projects. All files and tasks assigned to them are visible to all users!"
      group_description_p6_html: "These are Site projects. They can be used to share files and tasks among the set of users belonging to the associated Site."
      group_description_p7_html: "This special <strong>ALL Project</strong> is in fact no<br />project at all. Selecting this as your currently active<br />'project' will disable all project-based filtering, so<br />you will see together <strong>all</strong> files and tasks.<br />The file manager and task manager will each show you a new<br />column where you'll be able to filter by project directly<br />there. Selecting the <strong>ALL Project</strong> is useful<br />when you need to manage or browse files and tasks that are<br />in multiple projects."
      group_description_p8_html: "Projects that for some reason are not assigned to other tabs"
