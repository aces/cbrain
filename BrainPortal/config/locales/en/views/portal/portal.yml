      step_3_html: "<strong>Select an attribute for the rows and columns</strong> using each of the selection<br />boxes shown at the top and left of the table area."
      step_4_html: "<strong>Click on \"Generate Report\"</strong> and the table will be created with<br />hot links to the appropriate index pages for your objects. You can<br />modify the report's properties and regenerate it anew any time you want."
