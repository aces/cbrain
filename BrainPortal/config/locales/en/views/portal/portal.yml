    provenance:
      title:   "Provenance"
      header:  "CBRAIN Provenance Statement"
      p1_html: "New features and bug fixes are tested and released into the<br />development branch upon completion.  Continuous integration testing<br />is performed in an automated fashion and is applied to all code<br />incorporated into the development repository.  All pull requests<br />are reviewed and validated by the senior development team before<br />either being accepted or returned so as to undergo further<br />modification and testing by the submitting developer."
      p2_html: "Major releases are made so as amalgamate together collections of<br />bug fixes, patches and new features assessed as beneficial for<br />issuance as a cumulative, integrated release for community use.<br />Major releases are performed by the CBRAIN Lead Developer and<br />authorized together with the CBRAIN Team Director."
      p3_html: "Each release contains an associated set of release notes documentation<br />clearly identifying the new features and issues that are addressed<br />within a given release."
      p4_html: "%{release_link}<br />are available in the CBRAIN GitHub repository."
