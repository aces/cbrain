      # Start services panel
      start_services: "Start Services"
      start_services_description_p_1_html: "These buttons start the different layers of services required to<br />boot an Execution Server. They are listed in the same order as they<br />need to be started. The first three buttons<br />only apply to Execution Servers, while <strong>Start Activity Workers</strong><br />applies to both Execution Servers and Portals."
      start_services_description_p_2_html: "Refer the the last four columns of the table to find out what service<br />are currently operational. The four buttons in this pannel map<br />to them in the same order."
      start_services_description_p_3_html: "Also note that your browser blocks while these requests are being processed;<br />be patient and check your browser's progress bar. Do not perform long operations<br />on multiple Execution Servers to avoid timeouts."


      start_tunnels_description_html: "The tunnel is the main communication channel between the Portal<br />and the remote server where the Execution Server is configured. It is<br />necessary for the Execution Server and the Task Workers. Starting the<br />tunnel will mark the Execution Server as \"online\" in the database.<br />Note that you can also start the tunnel with the \"Start Execution Server\"<br />button. Consider starting just the tunnel as a way to verify that the network<br />parameters are valid (e.g. to check hostnames, ports, firewalls, etc)."
      start_tunnels: "1. Start Tunnels"

      start_execution_server_description_html: "The Execution Server requires the tunnel, above. Note that as convenience<br />feature, if the tunnel is not started, starting the Execution Server will also<br />start the tunnel first."
      start_execution_server: "2. Start Execution Server"

      start_task_workers_description_html: "Task workers require a Tunnel and the Execution Server to be up."
      start_task_workers: "3a. Start Task Workers"

      start_activity_workers_description_html: "Activity workers are the only service that can be started or stopped<br />on Portals too. On portals the workers don't require any of the other layers<br />above. On Execution Servers these workers require both the Tunnel and the<br />Execution Server to be running."
      start_activity_workers: "3b. Start Activity Workers"

      # Stop services panel
      stop_services: "Stop Services"
      stop_services_description_p_1_html: "These buttons stop the different layers of services associated with<br />an Execution Server. They are listed in the same order as they<br />need to be stopped. The last three buttons<br />only apply to Execution Servers, while <strong>Stop Activity Workers</strong><br />applies to both Execution Servers and Portals."
      stop_services_description_p_2_html: "Refer the the last four columns of the table to find out what service<br />are currently operational. The four buttons in this pannel map<br />to them in <em>reverse order</em> (right to left)."
      processing_in_orange_text: "processing in orange text"
      stop_services_description_p_3_html: "Note that stopping the Workers (any type) is an action that ask<br />them to shut down gracefully. If they are processing something, they will finish it<br />first. The last two columns of the table indicate if they are currently busy<br />with the word %{html_colorize_text}.<br />In some cases it can take a long time for the workers to stop. Refreshing this<br />page will tell you when they are stopped, but remember that the page's content<br />is normally only updated once every 30 seconds."
      stop_services_description_p_4_html: "Also note that your browser blocks while these requests are being processed;<br />be patient and check your browser's progress bar. Do not perform long operations<br />on multiple Execution Servers to avoid timeouts."

      stop_activity_workers_description_html: "Activity Workers can run on both Portals and Execution Servers. Stopping them<br />will send them a signal to finish their current processing actions and then exit."
      stop_activity_workers: "1a. Stop Activity Workers"
      stop_activity_workers_confirmation: "Are you sure you want to stop the Activity Workers? They will finish what they are doing first."

      stop_task_workers_description_html: "Stopping Task Workers will send them a signal to finish what they are doing<br />and then exit. This can take some time."
      stop_task_workers: "1b. Stop Task Workers"
      stop_task_workers_confirmation: "Are you sure you want to stop the Task Workers? They will finish what they are doing first."

      processing: "processing"
      stop_execution_server_description_html: "Stopping an Execution Server will also stop the Task Workers <strong>and</strong> Activity Workers running on it.<br />Make sure they are not actively %{processing} something."
      stop_execution_server: "2. Stop Execution Server"
      stop_execution_server_confirmation: "Are you sure you want to stop the Execution Server? Note that workers will also shut down once they are done, if they are still active."

      not_safe: "not safe"
      stop_tunnels_description_html: "Remember that is it %{processing} to stop Tunnels if<br />any of the Workers are currently %{not_safe} something."
      stop_tunnels: "3. Stop Tunnels"
      stop_tunnels_confirmation: "Make sure Execution Servers, Task Workers and Activity workers are all stopped!"

