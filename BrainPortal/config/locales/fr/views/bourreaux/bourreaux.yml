      header: "Some Notes About Configuring An Execution Server"
      notes_p_1_html: "An Execution Server is a remote Rails application that is used by the<br />BrainPortal. Like all Rails applications, it runs on some host<br />somewhere, it listens to HTTP connections on some port and needs<br />to connect to the same database server as the BrainPortal."
      notes_p_2_html: "Unlike the BrainPortal, the HTTP connections it expects are not<br />from a user's browser, but they are XML requests issued by the<br />BrainPortal using a Rails protocol called ActiveResource. There<br />are several ways that the BrainPortal can be told how to connect to<br />and manage the Execution Server, which explains all the fields in this form."

