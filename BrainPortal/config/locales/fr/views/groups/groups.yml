    view_buttons:
      group_description_p1_html: "<br />Un projet est un moyen de regrouper sous un même nom un ensemble de fichiers et de tâches CBRAIN.<br />Un projet <em>n'est pas un dossier</em>.<br /><br />Changer pour un projet en fait le projet 'actif'.<br />Lorsqu'un projet est actif, un filtre implicite automatique s'applique de sorte que seuls les fichiers et les tâches assignés au projet sont affichés dans le gestionnaire de fichiers ou de tâches."
      group_description_p2_html: "Ces projets ne sont visibles que par vous.<br />Il y a un projet particulier nommé <strong>%{name}</strong> qui est créé par le système pour vous, par défaut, et qui ne peut pas être supprimé.<br />N'importe lequel de ces projets peut être transformé en projet partagé en invitant d'autres utilisateurs à le rejoindre.<br />Lorsque cela se produit, les projets apparaîtront dans un onglet séparé."
      group_description_p3_html: "Ce sont les projets que vous avez créés et qui sont partagés avec d'autres utilisateurs.<br />Les fichiers et les tâches assignés à un projet sont visibles par tous les utilisateurs de ce projet."
      group_description_p4_html: "Ce sont les projets créés par d'autres utilisateurs qui vous ont invité à les rejoindre.<br />Les fichiers et les tâches assignés à un projet sont visibles par tous les utilisateurs de ce projet."
      group_description_p5_html: "Ce sont des projets publics.<br />Tous les fichiers et tâches qui leur sont assignés sont visibles par tous les utilisateurs !"
      group_description_p6_html: "Ce sont des projets de site.<br />Ils peuvent être utilisés pour partager des fichiers et des tâches entre l'ensemble des utilisateurs appartenant au site associé."
      group_description_p7_html: "Ce projet spécial <strong>TOUS</strong> n'est en fait aucun projet du tout.<br />Le sélectionner comme 'projet' actuellement actif désactivera tout filtrage par projet, vous verrez donc ensemble <strong>tous</strong> les fichiers et tâches.<br />Le gestionnaire de fichiers et le gestionnaire de tâches vous montreront chacun une nouvelle colonne où vous pourrez filtrer par projet directement là-bas.<br />Sélectionner le projet <strong>TOUS</strong> est utile lorsque vous avez besoin de gérer ou de parcourir des fichiers et des tâches qui sont dans plusieurs projets."
      group_description_p8_html: "Les projets qui, pour une raison quelconque, ne sont assignés à aucun autre onglet"
