      header: "Générateur de rapports tabulaires automatiques"
      description_html: "Ce formulaire vous permet de générer de nombreux types de rapports<br />sous forme de tableau. Procédez comme suit:"
      step_1_html: "<strong>Sélectionnez le type de rapport</strong> dans la zone grise. La plupart des rapports<br />compteront le nombre d'objets accessibles, mais certains d'entre eux<br />effectueront une somme de certains attributs."
      step_2_html: "<strong>Cliquez sur « Rechercher colonnes et lignes »</strong> et le formulaire s'ajustera<br />pour vous montrer quels attributs vous pouvez sélectionner pour les lignes et les colonnes de<br />votre tableau."
      step_3_html: "<strong>Sélectionnez un attribut pour les lignes et les colonnes</strong> en utilisant chacune des cases<br />de sélection affichées en haut et à gauche de la zone de tableau."
      step_4_html: "<strong>Cliquez sur « Générer le rapport »</strong> et le tableau sera créé avec<br />des liens directs vers les pages d'index appropriées pour vos objets. Vous pouvez<br />modifier les propriétés du rapport et le générer à nouveau à tout moment."
