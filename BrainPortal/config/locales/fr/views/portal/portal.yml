    provenance:
      title:   "Provenance"
      header:  "Déclaration de provenance de CBRAIN"
      p1_html: "Les nouvelles fonctionnalités et les corrections de bugs sont testées et publiées dans la branche de développement dès leur achèvement. Les tests d'intégration continue sont effectués de manière automatisée et appliqués à tout code incorporé dans le référentiel de développement. Toutes les demandes de tirage sont examinées et validées par l'équipe de développement senior avant d'être acceptées ou retournées pour subir une modification et des tests supplémentaires par le développeur soumettant."
      p2_html: "Les versions majeures sont faites pour amalgamer ensemble des collections de corrections de bugs, de correctifs et de nouvelles fonctionnalités évalués comme bénéfiques pour l'émission en tant que version cumulative intégrée pour une utilisation communautaire. Les versions majeures sont effectuées par le développeur principal de CBRAIN et autorisées avec le directeur de l'équipe CBRAIN."
      p3_html: "Chaque version contient un ensemble associé de notes de version documentant clairement les nouvelles fonctionnalités et les problèmes qui sont abordés dans une version donnée."
      p4_html: "%{release_link}<br />sont disponibles dans le référentiel GitHub de CBRAIN."
      md_file: "Notes de version"
      last_updated: "Document mis à jour pour la dernière fois:"

