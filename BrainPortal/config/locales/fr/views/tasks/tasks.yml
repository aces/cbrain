      for_failed_tasks: "Pour les tâches échouées"
      for_failed_tasks_p_html: "Ce panneau vous permet d'affecter les tâches qui ont échoué, d'une manière ou d'une autre.<br />Tenter de récupérer des erreurs déclenchera un code de nettoyage et un redémarrage à<br />l'étape de traitement réussie la plus proche avant l'échec. Cela ne fonctionne pas toujours<br />mais il est souvent utile d'essayer au moins une fois !"
      trigger_error_recovery: "Déclencher la récupération d'erreur"

      for_completed_tasks: "Pour les tâches terminées"
      for_completed_tasks_p_html: "Ce panneau vous permet d'affecter les tâches qui se sont terminées avec succès.<br />Vous pouvez essayer de les redémarrer à trois étapes différentes de leur cycle de vie :"
      for_completed_tasks_ul_html: "<ul><li>À l'étape <strong>Configuration</strong>, lorsque les fichiers de données d'entrée<br />sont synchronisés sur le serveur d'exécution et que les<br />scripts de traitement sont créés.</li><li>À l'étape <strong>Cluster</strong>, lorsque les scripts scientifiques<br />sont réellement exécutés sur les nœuds du serveur d'exécution.</li><li>À l'étape <strong>Post-traitement</strong>, lorsque les fichiers de sortie<br/>résultants sont renvoyés aux fournisseurs de données CBRAIN.</li></ul>"

      setup_stage: "Étape \"Configuration\""
      cluster_stage: "Étape \"Cluster\""
      post_processing_stage: "Étape \"Post-traitement\""

      restart_at: "Redémarrer à :"
      for_completed_tasks_note_html: "Vous pouvez également dupliquer des tâches et les recréer sur un serveur<br />d'exécution différent. Avant de les redémarrer, assurez-vous cependant d'ajuster<br />leur version d'outil."
      duplicate_tasks: "Dupliquer les tâches"
      on_execution_server: "sur le serveur d'exécution : "

      terminating_and_cleaning_up: "Terminaison et nettoyage"
      terminating_and_cleaning_up_p_html: "Ce panneau vous permet d'affecter les tâches dont vous n'avez plus besoin.<br />Vous pouvez terminer les tâches à n'importe quel stade de leur cycle de vie, même les<br />tâches échouées. Les tâches marquées <strong>Terminées</strong> peuvent être redémarrées<br />plus tard."
      terminate_tasks: "Terminer les tâches"
      confirm_terminate_tasks: "Êtes-vous sûr de vouloir terminer les tâches sélectionnées ?"
      remove_work_directories_note_html: "Il est également possible de supprimer les répertoires de travail des tâches<br />sur le serveur d'exécution tout en laissant le reste des informations<br />des tâches intact. Cela est utile pour libérer de l'espace sur le serveur<br />ou lorsque les tâches ont traité des informations confidentielles que<br />vous préférez ne pas laisser là-bas. Le panneau <em>Archivage</em><br />sur la gauche vous offre d'autres options pour vous débarrasser des<br />répertoires de travail des tâches."

      remove_work_directories: "Supprimer les répertoires de travail"
      confirm_remove_work_directories: "Êtes-vous sûr de vouloir supprimer les\nRÉPERTOIRES DE TRAVAIL des tâches sélectionnées ?"

      remove_tasks_p_html: "Enfin, vous pouvez supprimer complètement les tâches. Cela effacera le répertoire de travail de la tâche<br />sur le serveur d'exécution, y compris les données temporaires, mais n'effacera pas<br />les fichiers de sortie d'une tâche réussie. C'est utile si vous avez<br />des données confidentielles, par exemple. Supprimer une tâche <strong>supprimera</strong> toutes les<br />archives du répertoire de travail de la tâche, s'il y en a (comme indiqué par<br />les symboles %{workdir_status} et<br />%{userfile_status} dans la colonne 'Taille du répertoire')."
      remove_tasks: "Supprimer les tâches"
      confirm_remove_tasks: "Êtes-vous sûr de vouloir supprimer les tâches sélectionnées ?\n\nREMARQUE IMPORTANTE : Cela supprimera également leurs répertoires de travail archivés, s'il y en a."

      archiving: "Archivage"
      archiving_p_1_html: "Ce panneau vous permet d'archiver le contenu du répertoire de travail<br />de vos tâches. Cela ne peut être fait que sur des tâches dans un état final,<br />tel que <strong>Terminée</strong>, <strong>Échouée</strong> ou <strong>Stoppée</strong>."
      archiving_p_2_html: "Le processus peut prendre beaucoup de temps pour chaque tâche archivée ou restaurée, alors<br />soyez patient et ne demandez pas cette action plusieurs fois en parallèle."
      archiving_p_3_html: "Il existe deux « niveaux » différents d'archivage :<br/>\n<ul>\n  <li class=\"dropmenu_info\">\n    L'archivage <em>Sur le cluster</em> signifie que les fichiers de la tâche seront compressés et archivés mais resteront du côté du cluster. Ces tâches sont affichées avec le symbole %{workdir_status} dans le tableau d'index.\n  </li>\n  <li class=\"dropmenu_info\">\n    L'archivage <em>En tant que fichier</em> signifie que l'archive sera ramenée dans votre gestionnaire de fichiers sous la forme d'un fichier '%{type}' et qu'aucune donnée ne restera du côté du cluster. Ces tâches sont affichées avec le symbole %{userfile_status} dans le tableau d'index.\n  </li>\n</ul>"
      archiving_p_4_html: "Le reste des informations sur les tâches ne sera en aucun cas affecté<br />lors de leur archivage. Aucune opération ne peut être effectuée sur une tâche archivée, sauf<br />bien sûr de les désarchiver."
      archive_on_cluster: "Archiver sur le cluster"
