      full_task_object_in_json: "Objet de tâche complet en JSON"
      full_task_object_in_json_description_1_html: "Cette structure montre la quantité minimale d'informations nécessaire<br />pour créer une tâche CBRAIN similaire à celle-ci, à l'aide de l'API CBRAIN.<br />Ceci est fourni pour aider les développeurs travaillant avec l'API. Le niveau<br />supérieur contient les ID des ressources CBRAIN nécessaires à la tâche<br />(par exemple, l'ID du projet, l'ID de l'utilisateur, la version de l'outil,<br />etc.). Ce sont les valeurs que vous voyez en haut de la page dans<br />la section <em>Info</em>."
      full_task_object_in_json_description_2_html: "Les informations sous <strong>\"params\"</strong> correspondent exactement à ce qui<br />est affiché dans l'onglet précédent. Elles contiennent généralement les<br />paramètres scientifiques de l'outil, où les noms de fichiers sont remplacés<br />par les ID des fichiers enregistrés dans CBRAIN."
      full_task_object_in_json_description_3_html: "Pour les outils intégrés avec<br /><a href=\"https://github.com/boutiques/boutiques\" target=\"_blank\">Boutiques</a>,<br />la structure <strong>\"params\"</strong> contiendra une sous-structure appelée<br /><strong>\"invoke\"</strong> où la plupart des paramètres scientifiques sont<br />déplacés. Cette structure doit correspondre exactement à la structure d'invocation<br />attendue par le programme Boutiques <em>bosh</em>, mais toujours avec les noms<br />de fichiers remplacés par les ID de fichiers CBRAIN."
      full_task_object_in_json_description_4_html: "Notez que certaines clés et valeurs sont ajoutées à ces structures pendant ou<br />à la fin du traitement ne sont pas requises au moment où la tâche est<br />soumise."
